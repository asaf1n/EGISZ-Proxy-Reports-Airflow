# Декларативные правила для scripts/apply_metabase_field_filters.py.
# field_name — физическое имя колонки в DWH (snake_case).

version: 2

tags:
  parse_date:
    rules:
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: processed_at

  parse_created:
    rules:
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: processed_at

  local_uid:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: semd_local_uid
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: semd_local_uid

  relates_to:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: relates_to_id

  emdr_id:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: semd_emdr_id

  status:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: status_label

  log_id:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: logid

  error_type:
    rules:
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: error_type
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: error_type

  jid:
    rules:
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: clinic_jid
      - query_contains: [rpt_health_by_clinic]
        table_ref: public.rpt_health_by_clinic
        field_name: clinic_jid
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: clinic_jid
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: clinic_jid
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: clinic_jid

  semd_type:
    rules:
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: semd_code
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: semd_code
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: semd_code
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: semd_code

  dwh_date:
    rules:
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: processed_at
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: processed_at
      - display_name_contains: [Отправлено]
        table_ref: public.rpt_documents_waiting
        field_name: sent_at
      - display_name_contains_lower: [очередь]
        table_ref: public.rpt_documents_waiting
        field_name: sent_at
      - display_name_contains: ["День"]
        query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: processed_day
      - display_name_contains: [Дата обработки]
        query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: processed_at
      - table_ref: public.rpt_documents
        field_name: processed_at

  mgmt_period:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: processed_at

  clinic_jid:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: clinic_jid
