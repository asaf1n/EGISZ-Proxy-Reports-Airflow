# Декларативные правила для scripts/apply_metabase_field_filters.py (ручной repair-инструмент).
# field_name — физическое имя колонки в DWH (snake_case). Единая модель имён:
# дата = ips_date (EXCHANGELOG.CREATEDATE), поступление = first_sent_at; JID/СЭМД/Статус — по
# label-колонкам (поиск по коду и наименованию).

version: 2

tags:
  parse_date:
    rules:
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: ips_date

  parse_created:
    rules:
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: ips_date

  local_uid:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: semd_local_uid
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: semd_local_uid

  relates_to:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: relates_to_msgid

  emdr_id:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: semd_emdr_id

  status:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: status_label

  log_id:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: logid

  # «Тип ошибки» работает только на грейне rpt_error_breakdown (1 строка = 1
  # канонический тип на документ): точный матч по канону без потери документов с
  # множественными ошибками. rpt_documents больше не имеет колонки error_type.
  error_type:
    rules:
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: error_type

  # Поиск по клинике «код или наименование» → label-колонка.
  jid:
    rules:
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: clinic_label
      - query_contains: [rpt_health_by_clinic]
        table_ref: public.rpt_health_by_clinic
        field_name: clinic_label
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: clinic_label
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: clinic_label
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: clinic_label

  # Поиск по СЭМД «код или наименование» → label-колонка.
  semd_type:
    rules:
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: semd_label
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: semd_label
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: semd_label
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: semd_label

  # Период «Обработано IPS» (ips_date). На очереди — поступление (first_sent_at);
  # день берётся из полной даты инлайн, отдельной day-колонки нет.
  ips_date:
    rules:
      - query_contains: [rpt_network_errors]
        table_ref: public.rpt_network_errors
        field_name: ips_date
      - query_contains: [rpt_error_breakdown]
        table_ref: public.rpt_error_breakdown
        field_name: ips_date
      - display_name_contains_lower: [очередь, поступл, отправ]
        table_ref: public.rpt_documents_waiting
        field_name: first_sent_at
      - query_contains: [rpt_documents_waiting]
        table_ref: public.rpt_documents_waiting
        field_name: first_sent_at
      - table_ref: public.rpt_documents
        field_name: ips_date

  clinic_jid:
    rules:
      - query_contains: [rpt_documents]
        table_ref: public.rpt_documents
        field_name: clinic_jid
