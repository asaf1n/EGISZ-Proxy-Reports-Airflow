# Values for Apache Airflow Helm chart.
#
# helm repo add apache-airflow https://airflow.apache.org/charts
# helm upgrade --install airflow apache-airflow/airflow -f k8s/airflow/values.yaml --timeout 15m

airflowVersion: "3.2.2"

config:
  core:
    dags_are_paused_at_creation: "True"
    parallelism: "8"
    max_active_tasks_per_dag: "2"
  celery:
    operation_timeout: "30.0"
    worker_concurrency: "2"
  dag_processor:
    # В Airflow 3 параметры парсинга DAG-файлов переехали из [scheduler] в [dag_processor].
    min_file_process_interval: "30"

workers:
  replicas: 1
  celery:
    replicas: 1

images:
  airflow:
    repository: egisz-airflow-worker
    tag: latest
    pullPolicy: IfNotPresent
  redis:
    repository: redis
    tag: 7.2.5-bookworm
    pullPolicy: IfNotPresent

data:
  metadataConnection:
    user: postgres
    pass: postgres
    protocol: postgresql
    port: 5432
    db: airflow_db
    sslmode: disable

postgresql:
  enabled: true
  auth:
    enablePostgresUser: true
    postgresPassword: postgres
    database: airflow_db

# Connections dwh_egisz_pg / proxy_egisz_fb are NOT injected as AIRFLOW_CONN_* env vars:
# up.ps1 stores them in the Airflow metadata database after scheduler startup
# (see Initialize-AirflowEgiszConnections), so Admin -> Connections is the single source.
#
# Pool dwh_postgres is NOT provisioned by the official apache-airflow Helm chart.
# up.ps1 calls `airflow pools set` after scheduler startup (see Initialize-AirflowDwhPool).

# Airflow 3: UI и REST API отдаёт api-server (компонента webserver снята),
# DAG-файлы парсит выделенный dag-processor.
apiServer:
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
    timeoutSeconds: 10
  readinessProbe:
    timeoutSeconds: 10
  resources:
    requests:
      memory: 1536Mi
      cpu: 500m
    limits:
      memory: 3Gi
      cpu: "1"
  service:
    type: LoadBalancer
