apiVersion: v1
kind: Service
metadata:
  name: metabase
  labels:
    app.kubernetes.io/name: metabase
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: metabase
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  labels:
    app.kubernetes.io/name: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      containers:
        - name: metabase
          image: egisz-metabase:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MB_PASSWORD_COMPLEXITY
              value: weak
            - name: MB_PASSWORD_LENGTH
              value: "4"
            - name: METABASE_SITE_NAME
              value: "Интеграция с ЕГИСЗ"
            - name: METABASE_AUTO_PROVISION
              value: "false"
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_DB_HOST
            - name: MB_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_DB_PORT
            - name: MB_DB_DBNAME
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_DB_NAME
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_DB_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_DB_PASSWORD
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_ADMIN_EMAIL
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_ADMIN_PASSWORD
            - name: APP_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_DB_HOST
            - name: APP_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_DB_PORT
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_DB_NAME
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_BI_USER
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_BI_PASSWORD
            - name: APP_DB_DISPLAY_NAME
              value: "DWH ЕГИСЗ"
