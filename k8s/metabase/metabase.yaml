apiVersion: v1
kind: Service
metadata:
  name: metabase-postgres
  labels:
    app.kubernetes.io/name: metabase-postgres
spec:
  selector:
    app.kubernetes.io/name: metabase-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: metabase-postgres
  labels:
    app.kubernetes.io/name: metabase-postgres
spec:
  serviceName: metabase-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: metabase_app
            - name: POSTGRES_USER
              value: metabase
            - name: POSTGRES_PASSWORD
              value: metabase
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [pg_isready, -U, metabase, -d, metabase_app]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
  labels:
    app.kubernetes.io/name: metabase
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: metabase
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  labels:
    app.kubernetes.io/name: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command: ['sh', '-c', 'until pg_isready -h metabase-postgres -U metabase -d metabase_app; do sleep 2; done']
      containers:
        - name: metabase
          image: egisz-metabase:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MB_PASSWORD_COMPLEXITY
              value: weak
            - name: MB_PASSWORD_LENGTH
              value: "4"
            - name: METABASE_SITE_NAME
              value: "Интеграция с ЕГИСЗ"
            - name: METABASE_AUTO_PROVISION
              value: "false"
            - name: METABASE_FORCE_PROVISION
              value: "always"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.net.preferIPv4Stack=true"
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              value: metabase-postgres
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: metabase_app
            - name: MB_DB_USER
              value: metabase
            - name: MB_DB_PASS
              value: metabase
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_ADMIN_EMAIL
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: METABASE_ADMIN_PASSWORD
            - name: APP_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_DB_HOST
            - name: APP_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_DB_PORT
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_DB_NAME
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_BI_USER
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-connections
                  key: DWH_BI_PASSWORD
            - name: APP_DB_DISPLAY_NAME
              value: "DWH ЕГИСЗ"
