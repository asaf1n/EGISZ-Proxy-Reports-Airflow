apiVersion: v1
kind: Service
metadata:
  name: metabase
  labels:
    app.kubernetes.io/name: metabase
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: metabase
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  labels:
    app.kubernetes.io/name: metabase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      containers:
        - name: metabase
          image: egisz-monitor-metabase:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MB_PASSWORD_COMPLEXITY
              value: weak
            - name: MB_PASSWORD_LENGTH
              value: "4"
            - name: METABASE_ADMIN_EMAIL
              value: "admin@egisz.local"
            - name: METABASE_ADMIN_PASSWORD
              value: "egisz"
            # Metabase application DB (external Postgres)
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              value: host.docker.internal
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: metabase_app
            - name: MB_DB_USER
              value: postgres
            - name: MB_DB_PASS
              value: postgres
            # Target application DB for reports
            - name: APP_DB_HOST
              value: host.docker.internal
            - name: APP_DB_PORT
              value: "5432"
            - name: APP_DB_NAME
              value: dwh_egisz
            - name: APP_DB_USER
              value: egisz
            - name: APP_DB_PASSWORD
              value: egisz
