apiVersion: v1
kind: Secret
metadata:
  name: proxy-reports-elt-env
type: Opaque
stringData:
  # Firebird
  FB_DSN: "host.docker.internal/3050:/path/to/your.fdb"
  FB_USER: "SYSDBA"
  FB_PASSWORD: "masterkey"
  FB_CHARSET: "WIN1251"

  # Postgres
  PG_DSN: "postgresql://elt:elt@postgres.example.local:5432/dwh"

  # ETL behavior
  ETL_PIPELINE: "proxy_reports"
  ETL_BATCH_SIZE: "500"
  ETL_CURSOR_COLUMN: "LOGID"
  PG_TARGET_TABLE: "proxy_reports_raw"

  # Source query must include the cursor column (ETL_CURSOR_COLUMN).
  # Keep it stable and deterministic; it will be wrapped for keyset pagination.
  FB_SOURCE_SQL: "SELECT LOGID, MSGID, LOGDATE, LOGTEXT FROM EXCHANGELOG"
