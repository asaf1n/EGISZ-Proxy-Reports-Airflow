apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-metadata-db-init
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init
          image: postgres:16-bookworm
          env:
            - name: PGHOST
              value: host.docker.internal
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              value: postgres
            - name: PGPASSWORD
              value: postgres
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              EXISTS="$(psql -d postgres -Atqc "SELECT 1 FROM pg_database WHERE datname='airflow'" | tr -d '[:space:]' || true)"
              if [ "$EXISTS" = "1" ]; then
                echo "database airflow already exists"
                exit 0
              fi
              psql -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE airflow;"
              echo "created database airflow"
