name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

# Прототип: минимальный CI — статические/контрактные pytest-проверки
# (SQL/DAG/дашборды как текст + unit-хелперы). Идемпотентность схемы и живые
# дашборды проверяются локально через двойной прогон db/dwh_init.sql и up.ps1.
jobs:
  pytest:
    name: Pytest (egisz_elt + dashboards contracts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest pyyaml

      - name: Run pytest
        run: pytest -q
