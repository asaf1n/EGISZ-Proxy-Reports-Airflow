x-airflow-env: &airflow-env
  AIRFLOW_HOME: /opt/airflow
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_METADATA_CONN:-postgresql+psycopg2://postgres:postgres@host.docker.internal:5432/airflow_db}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__UNIT_TEST_MODE: "False"
  AIRFLOW__WEBSERVER__BASE_LOG_FOLDER: /opt/airflow/logs
  AIRFLOW__WEBSERVER__DAG_DEFAULT_VIEW: grid
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
  AIRFLOW_CONN_DWH_EGISZ_PG: ${AIRFLOW_CONN_DWH_EGISZ_PG:-postgres://egisz:egisz@host.docker.internal:5432/dwh_egisz?sslmode=disable}
  AIRFLOW_CONN_PROXY_EGISZ_FB: ${AIRFLOW_CONN_PROXY_EGISZ_FB:-firebird://SYSDBA:masterkey@host.docker.internal:3050/proxy_egisz?charset=WIN1251}

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    <<: *airflow-env
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - airflow_logs:/opt/airflow/logs

services:
  airflow-init:
    <<: *airflow-common
    container_name: egisz-airflow-init
    environment:
      <<: *airflow-env
      AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      AIRFLOW_WWW_USER_FIRSTNAME: EGISZ
      AIRFLOW_WWW_USER_LASTNAME: Admin
      AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_EMAIL:-admin@egisz.local}
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username $${AIRFLOW_WWW_USER_USERNAME} --password $${AIRFLOW_WWW_USER_PASSWORD} --firstname $${AIRFLOW_WWW_USER_FIRSTNAME} --lastname $${AIRFLOW_WWW_USER_LASTNAME} --role Admin --email $${AIRFLOW_WWW_USER_EMAIL} || true"

  airflow-webserver:
    <<: *airflow-common
    container_name: egisz-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    command: airflow webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: egisz-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler

  metabase:
    build:
      context: .
      dockerfile: metabase/Dockerfile
    container_name: egisz-metabase
    ports:
      - "${METABASE_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MB_URL: http://localhost:3000
      MB_SITE_URL: http://127.0.0.1:3000
      MB_PASSWORD_COMPLEXITY: weak
      MB_PASSWORD_LENGTH: "4"
      METABASE_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@egisz.local}
      METABASE_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD:-egisz}
      METABASE_SITE_NAME: ${METABASE_SITE_NAME:-Интеграция с ЕГИСЗ}
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${METABASE_DB_HOST:-host.docker.internal}
      MB_DB_PORT: ${METABASE_DB_PORT:-5432}
      MB_DB_DBNAME: ${METABASE_DB_NAME:-metabase_app}
      MB_DB_USER: ${METABASE_DB_USER:-postgres}
      MB_DB_PASS: ${METABASE_DB_PASSWORD:-postgres}
      APP_DB_HOST: ${DWH_DB_HOST:-host.docker.internal}
      APP_DB_PORT: ${DWH_DB_PORT:-5432}
      APP_DB_NAME: ${DWH_DB_NAME:-dwh_egisz}
      APP_DB_USER: ${DWH_BI_USER:-postgres}
      APP_DB_PASSWORD: ${DWH_BI_PASSWORD:-postgres}
      APP_DB_DISPLAY_NAME: ${APP_DB_DISPLAY_NAME:-DWH ЕГИСЗ}
      METABASE_FORCE_PROVISION: ${METABASE_FORCE_PROVISION:-auto}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.net.preferIPv4Stack=true"
    volumes:
      - metabase_shared:/shared

volumes:
  airflow_logs:
  metabase_shared:
