services:
  db-init:
    image: postgres:16-bookworm
    container_name: proxy-reports-db-init
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PGHOST: ${POSTGRES_HOST:-host.docker.internal}
      PGPORT: ${POSTGRES_PORT:-5432}
      PGUSER: ${POSTGRES_ADMIN_USER:-egisz}
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD:-egisz}
      DWH_DB_NAME: ${DWH_DB_NAME:-dwh_egisz}
      METABASE_APP_DB_NAME: ${METABASE_APP_DB_NAME:-metabase_app}
    volumes:
      - ./scripts/ensure-databases.sh:/ensure-databases.sh:ro
    command: ["/bin/bash", "/ensure-databases.sh"]

  etl-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-reports-etl-sync
    depends_on:
      db-init:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      FB_DSN: ${FB_DSN:-host.docker.internal/3050:proxy_egisz}
      FB_USER: ${FB_USER:-sysdba}
      FB_PASSWORD: ${FB_PASSWORD:-masterkey}
      FB_CHARSET: ${FB_CHARSET:-WIN1251}
      PG_DSN: ${PG_DSN:-postgresql://egisz:egisz@host.docker.internal:5432/dwh_egisz}
      ETL_PIPELINE: ${ETL_PIPELINE:-proxy_reports}
      ETL_BATCH_SIZE: ${ETL_BATCH_SIZE:-500}
      ETL_CURSOR_COLUMN: ${ETL_CURSOR_COLUMN:-LOGID}
      PG_TARGET_TABLE: ${PG_TARGET_TABLE:-proxy_reports_raw}
      FB_SOURCE_SQL: ${FB_SOURCE_SQL:-SELECT LOGID, LOGDATE, LOGTYPE, LOGSTATE, LOGMODE, MSGID, MSGTEXT, GRPID, CREATEDATE, MODIFYDATE, REPL$ID, REPL$GRPID, LOGTEXT, METHOD, URI, ACTION, PARENTLOGID FROM EXCHANGELOG}
    command: ["sync"]

  metabase:
    build:
      context: .
      dockerfile: metabase/Dockerfile
    container_name: proxy-reports-metabase
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MB_URL: http://localhost:3000
      MB_SITE_URL: http://127.0.0.1:3000
      MB_PASSWORD_COMPLEXITY: weak
      MB_PASSWORD_LENGTH: "4"
      METABASE_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@egisz.local}
      METABASE_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD:-egisz}
      METABASE_SITE_NAME: ${METABASE_SITE_NAME:-Proxy Reports Metabase}
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${POSTGRES_HOST:-host.docker.internal}
      MB_DB_PORT: ${POSTGRES_PORT:-5432}
      MB_DB_DBNAME: ${METABASE_APP_DB_NAME:-metabase_app}
      MB_DB_USER: ${POSTGRES_ADMIN_USER:-egisz}
      MB_DB_PASS: ${POSTGRES_ADMIN_PASSWORD:-egisz}
      APP_DB_HOST: ${POSTGRES_HOST:-host.docker.internal}
      APP_DB_PORT: ${POSTGRES_PORT:-5432}
      APP_DB_NAME: ${DWH_DB_NAME:-dwh_egisz}
      APP_DB_USER: ${POSTGRES_ADMIN_USER:-egisz}
      APP_DB_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-egisz}
      APP_DB_DISPLAY_NAME: ${APP_DB_DISPLAY_NAME:-Proxy Reports DWH}
      METABASE_FORCE_PROVISION: ${METABASE_FORCE_PROVISION:-auto}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.net.preferIPv4Stack=true"
    volumes:
      - metabase_shared:/shared

volumes:
  metabase_shared:
