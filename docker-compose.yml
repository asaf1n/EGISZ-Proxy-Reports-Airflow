x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    AIRFLOW_HOME: /opt/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_ADMIN_USER:-postgres}:${POSTGRES_ADMIN_PASSWORD:-postgres}@postgres:5432/airflow_db
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__UNIT_TEST_MODE: "False"
    AIRFLOW__WEBSERVER__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__WEBSERVER__DAG_DEFAULT_VIEW: tree
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    AIRFLOW__WEBSERVER__RBAC: "True"
    # ETL Variables
    FB_DSN: ${FB_DSN:-host.docker.internal/3050:proxy_egisz}
    FB_USER: ${FB_USER:-sysdba}
    FB_PASSWORD: ${FB_PASSWORD:-masterkey}
    FB_CHARSET: ${FB_CHARSET:-WIN1251}
    PG_DSN: ${PG_DSN:-postgresql://postgres:postgres@postgres:5432/dwh_egisz}
    ETL_PIPELINE: ${ETL_PIPELINE:-proxy_reports}
    ETL_BATCH_SIZE: ${ETL_BATCH_SIZE:-500}
    ETL_CURSOR_COLUMN: ${ETL_CURSOR_COLUMN:-LOGID}
    PG_TARGET_TABLE: ${PG_TARGET_TABLE:-proxy_reports_raw}
    FB_SOURCE_SQL: ${FB_SOURCE_SQL:-SELECT LOGID, LOGDATE, LOGTYPE, LOGSTATE, LOGMODE, MSGID, MSGTEXT, GRPID, CREATEDATE, MODIFYDATE, REPL$ID, REPL$GRPID, LOGTEXT, METHOD, URI, ACTION, PARENTLOGID FROM EXCHANGELOG}
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/logs:/opt/airflow/logs
    - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:16-bookworm
    container_name: proxy-reports-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER:-postgres} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    image: postgres:16-bookworm
    container_name: proxy-reports-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: ${POSTGRES_HOST:-postgres}
      PGPORT: ${POSTGRES_PORT:-5432}
      PGUSER: ${POSTGRES_ADMIN_USER:-postgres}
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      DWH_DB_NAME: ${DWH_DB_NAME:-dwh_egisz}
      METABASE_APP_DB_NAME: ${METABASE_APP_DB_NAME:-metabase_app}
    volumes:
      - ./scripts/ensure-databases.sh:/ensure-databases.sh:ro
    command: ["/bin/bash", "/ensure-databases.sh"]

  metabase:
    build:
      context: .
      dockerfile: metabase/Dockerfile
    container_name: proxy-reports-metabase
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "${METABASE_PORT:-3005}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MB_URL: http://localhost:3000
      MB_SITE_URL: http://127.0.0.1:3000
      MB_PASSWORD_COMPLEXITY: weak
      MB_PASSWORD_LENGTH: "4"
      METABASE_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@egisz.local}
      METABASE_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD:-egisz}
      METABASE_SITE_NAME: ${METABASE_SITE_NAME:-Proxy Reports Metabase}
      MB_DB_TYPE: postgres
      MB_DB_HOST: ${POSTGRES_HOST:-postgres}
      MB_DB_PORT: ${POSTGRES_PORT:-5432}
      MB_DB_DBNAME: ${METABASE_APP_DB_NAME:-metabase_app}
      MB_DB_USER: ${POSTGRES_ADMIN_USER:-postgres}
      MB_DB_PASS: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      APP_DB_HOST: ${POSTGRES_HOST:-postgres}
      APP_DB_PORT: ${POSTGRES_PORT:-5432}
      APP_DB_NAME: ${DWH_DB_NAME:-dwh_egisz}
      APP_DB_USER: ${POSTGRES_ADMIN_USER:-postgres}
      APP_DB_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-postgres}
      APP_DB_DISPLAY_NAME: ${APP_DB_DISPLAY_NAME:-Proxy Reports DWH}
      METABASE_FORCE_PROVISION: ${METABASE_FORCE_PROVISION:-auto}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.net.preferIPv4Stack=true"
    volumes:
      - metabase_shared:/shared

  airflow-init:
    <<: *airflow-common
    container_name: proxy-reports-airflow-init
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
      AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER:-admin}
      AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
      AIRFLOW_WWW_USER_FIRSTNAME: Proxy
      AIRFLOW_WWW_USER_LASTNAME: Reports
      AIRFLOW_WWW_USER_EMAIL: ${AIRFLOW_EMAIL:-admin@egisz.local}
    command: >
      bash -c "airflow db init && 
      airflow users create --username $${AIRFLOW_WWW_USER_USERNAME} --password $${AIRFLOW_WWW_USER_PASSWORD} --firstname $${AIRFLOW_WWW_USER_FIRSTNAME} --lastname $${AIRFLOW_WWW_USER_LASTNAME} --role Admin --email $${AIRFLOW_WWW_USER_EMAIL} || true"

  airflow-webserver:
    <<: *airflow-common
    container_name: proxy-reports-airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_PORT:-8085}:8080"
    command: airflow webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: proxy-reports-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: airflow scheduler

volumes:
  metabase_shared:
  postgres_data:
  airflow_logs:
es_data:
  airflow_logs:
